<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Log In · Critique</title>
    <link rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="/static/output.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body class="bg-neutral-95 flex items-center justify-center min-h-screen">
    <div
      class="w-full max-w-sm bg-neutral-900 border border-neutral-800 rounded p-6"
    >
      <h1 class="text-xl text-orange-500 font-semibold mb-6 text-center">
        Admin Login
      </h1>

      <form method="post" class="space-y-4 text-neutral-100">
        <div>
          <label class="block text-sm text-neutral-400 mb-1">Username</label>
          <input
            type="text"
            name="username"
            required
            class="w-full bg-neutral-950 border border-neutral-800 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-neutral-700"
          />
        </div>

        <div>
          <label class="block text-sm text-neutral-400 mb-1">Email</label>
          <input
            type="email"
            name="email"
            required
            class="w-full bg-neutral-950 border border-neutral-800 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-neutral-700"
          />
        </div>

        <div>
          <label class="block text-sm text-neutral-400 mb-1">Password</label>
          <input
            type="password"
            name="password"
            required
            class="w-full bg-neutral-950 border border-neutral-800 rounded px-3 py-2 text-sm focus:ring-1 focus:ring-neutral-700"
          />
        </div>

        <button
          type="submit"
          class="w-full mt-2 bg-neutral-100 text-neutral-950 text-sm font-medium py-2 rounded hover:bg-neutral-200 transition"
        >
          Log In
        </button>
      </form>

      {% with messages = get_flashed_messages(with_categories=true) %} {% if
      messages %} {% for category, message in messages %}
      <div
        class="px-3 py-2 text-xs text-center {% if category == 'error' %} text-red-700{% endif %} {% if category == 'success' %} text-green-700{% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %} {% endif %}{% endwith %}
    </div>
  </body>
</html>
