<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Edit Contact Info</title>
    <link rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="/static/output.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body class="bg-neutral-950 text-neutral-100 antialiased">
    <div class="max-w-xl mx-auto px-4 py-12">
      <div class="mb-8 border-b border-neutral-800 pb-5">
        <h1 class="text-xl font-bold tracking-tight text-neutral-100">Contact Information</h1>
        <p class="text-sm text-neutral-400 mt-1">
          Optional network shortcuts shown publicly on your profile.
        </p>
      </div>

      <form method="POST" class="space-y-5">
        <div>
          <label class="text-xs font-semibold text-neutral-400 uppercase tracking-wider">Phone Number</label>
          <input type="text" name="phone"
                 placeholder="+254..."
                 value="{{ user.contact.phone if user.contact else '' }}"
                 class="w-full mt-1.5 px-3 py-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition-all" />
        </div>

        <div>
          <label class="text-xs font-semibold text-neutral-400 uppercase tracking-wider">Website URL</label>
          <input type="url" name="website"
                 placeholder="https://yourwebsite.com"
                 value="{{ user.contact.website if user.contact else '' }}"
                 class="w-full mt-1.5 px-3 py-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition-all" />
        </div>

        <div>
          <label class="text-xs font-semibold text-neutral-400 uppercase tracking-wider">GitHub Handle</label>
          <div class="relative flex items-center mt-1.5">
            <span class="absolute left-3 text-sm text-neutral-600 font-medium select-none">@</span>
            <input type="text" name="github"
                   placeholder="username"
                   value="{{ user.contact.github if user.contact else '' }}"
                   class="w-full pl-7 pr-3 py-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition-all" />
          </div>
        </div>

        <div>
          <label class="text-xs font-semibold text-neutral-400 uppercase tracking-wider">Twitter / X Handle</label>
          <div class="relative flex items-center mt-1.5">
            <span class="absolute left-3 text-sm text-neutral-600 font-medium select-none">@</span>
            <input type="text" name="twitter"
                   placeholder="username"
                   value="{{ user.contact.twitter if user.contact else '' }}"
                   class="w-full pl-7 pr-3 py-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition-all" />
          </div>
        </div>

        <div>
          <label class="text-xs font-semibold text-neutral-400 uppercase tracking-wider">Telegram Handle</label>
          <div class="relative flex items-center mt-1.5">
            <span class="absolute left-3 text-sm text-neutral-600 font-medium select-none">@</span>
            <input type="text" name="telegram"
                   placeholder="username"
                   value="{{ user.contact.telegram if user.contact else '' }}"
                   class="w-full pl-7 pr-3 py-2 bg-neutral-900 border border-neutral-800 rounded-lg text-sm text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-600 focus:ring-1 focus:ring-neutral-600 transition-all" />
          </div>
        </div>

        <div class="flex items-center gap-3 bg-neutral-900/40 border border-neutral-900 rounded-lg p-3 mt-2">
          <input type="checkbox" id="show_phone" name="show_phone"
                 class="w-4 h-4 rounded bg-neutral-950 border-neutral-800 text-blue-600 focus:ring-0 accent-blue-600 cursor-pointer"
                 {% if user.contact and user.contact.show_phone %}checked{% endif %}>
          <label for="show_phone" class="text-sm text-neutral-300 cursor-pointer select-none">Show phone number publicly on profile</label>
        </div>

        <div class="flex gap-3 pt-4 border-t border-neutral-800 mt-6">
          <button type="submit"
                  class="px-4 py-2 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 rounded-lg text-sm font-medium text-white transition-colors shadow-lg shadow-blue-900/20">
            Save Changes
          </button>

          <a href="{{ url_for('profile', user_id=user.id) }}"
             class="px-4 py-2 bg-neutral-800 hover:bg-neutral-700 text-neutral-300 rounded-lg text-sm font-medium transition-colors border border-neutral-700/30">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </body>
</html>
