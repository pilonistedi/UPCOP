<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up · Critique</title>

    <link rel="icon"
      type="image/x-icon"
      href="{{ url_for('static', filename='favicon.ico') }}">

    <link rel="stylesheet" href="/static/output.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>

  <body class="bg-neutral-950 text-neutral-100 flex flex-col items-center justify-center h-screen w-screen overflow-hidden px-4 antialiased relative">

    <a href="{{ url_for('feed') }}"
       class="absolute top-4 left-4 sm:top-6 sm:left-6 text-xs text-neutral-500 hover:text-neutral-200 transition-colors inline-flex items-center gap-1.5 font-medium group z-10">
      <i class="fa-solid fa-arrow-left text-[10px] transform group-hover:-translate-x-0.5 transition-transform"></i>
      <span>Back to Feed</span>
    </a>

    <div class="w-full max-w-sm flex flex-col items-center justify-center heavy-clamp">

      <a href="{{ url_for('feed') }}"
         class="mb-4 sm:mb-6 flex flex-col items-center gap-2 sm:gap-3 hover:opacity-90 transition-opacity group">
        <div class="p-2 bg-neutral-900 border border-neutral-800 rounded-xl sm:rounded-2xl shadow-xl group-hover:border-neutral-700 transition-colors">
          <img
            src="{{ url_for('static', filename='images/logo.png') }}"
            alt="Critique"
            class="h-10 w-10 sm:h-12 sm:w-12 object-contain"
          >
        </div>
        <span class="text-2xl sm:text-3xl font-black text-neutral-100 tracking-tight bg-gradient-to-b from-neutral-100 to-neutral-400 bg-clip-text text-transparent">
          Critique
        </span>
      </a>

      <div class="w-full bg-neutral-900 border border-neutral-800/80 rounded-2xl p-5 sm:p-8 shadow-2xl">

        <h1 class="text-[11px] sm:text-xs uppercase tracking-wider text-neutral-500 font-semibold mb-4 sm:mb-6 text-center">
          Create your creator account
        </h1>

        <form action="{{ url_for('signup') }}" method="post" class="space-y-3 sm:space-y-4">

          <div>
            <label class="block text-[11px] sm:text-xs font-medium text-neutral-400 mb-1">Username</label>
            <div class="relative">
              <input type="text" name="username" placeholder="creativestudio" required
                class="w-full bg-neutral-950 border border-neutral-800 rounded-lg pl-9 pr-3 py-1.5 sm:py-2 text-xs text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-700 transition" />
              <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                <i class="fa-regular fa-user text-neutral-600 text-[11px]"></i>
              </div>
            </div>
          </div>

          <div>
            <label class="block text-[11px] sm:text-xs font-medium text-neutral-400 mb-1">Email Address</label>
            <div class="relative">
              <input type="email" name="email" placeholder="you@example.com" required
                class="w-full bg-neutral-950 border border-neutral-800 rounded-lg pl-9 pr-3 py-1.5 sm:py-2 text-xs text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-700 transition" />
              <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                <i class="fa-regular fa-envelope text-neutral-600 text-[11px]"></i>
              </div>
            </div>
          </div>

          <div>
            <label class="block text-[11px] sm:text-xs font-medium text-neutral-400 mb-1">Password</label>
            <div class="relative">
              <input type="password" name="password" placeholder="••••••••" required
                class="w-full bg-neutral-950 border border-neutral-800 rounded-lg pl-9 pr-3 py-1.5 sm:py-2 text-xs text-neutral-100 placeholder-neutral-600 focus:outline-none focus:border-neutral-700 transition" />
              <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
                <i class="fa-solid fa-lock text-neutral-600 text-[10px]"></i>
              </div>
            </div>
          </div>

          <div class="flex items-start gap-2 text-[10px] sm:text-[11px] text-neutral-400 leading-tight pt-0.5">
            <input type="checkbox" name="terms" id="terms" required
              class="mt-0.5 w-3 h-3 sm:w-3.5 sm:h-3.5 rounded border-neutral-800 bg-neutral-950 text-neutral-100 accent-neutral-300 focus:ring-0 cursor-pointer" />

            <label for="terms" class="cursor-pointer select-none text-neutral-400">
              I agree to the
              <a href="{{ url_for('terms') }}" class="text-neutral-300 underline hover:text-neutral-100 transition-colors">User Agreement</a>,
              <a href="{{ url_for('privacy') }}" class="text-neutral-300 underline hover:text-neutral-100 transition-colors">Privacy Policy</a>.
            </label>
          </div>

          <button type="submit"
            class="w-full mt-1 inline-flex items-center justify-center gap-1.5 bg-neutral-100 hover:bg-neutral-200 text-neutral-950 text-xs font-semibold py-2 sm:py-2.5 rounded-lg transition-all shadow-sm cursor-pointer">
            <span>Create Account</span>
            <i class="fa-solid fa-arrow-right text-[10px]"></i>
          </button>

        </form>

        <p class="text-[11px] sm:text-xs text-neutral-500 text-center mt-4">
          Already have an account?
          <a href="{{ url_for('login') }}" class="text-neutral-300 hover:text-neutral-100 hover:underline transition-colors font-medium">
            Log in
          </a>
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="mt-3 space-y-1 max-h-16 overflow-y-auto">
              {% for category, message in messages %}
                <div class="px-2.5 py-1.5 text-[11px] rounded-md flex items-center gap-2 border
                  {{ 'bg-rose-500/10 border-rose-500/20 text-rose-400' if category == 'error' else 'bg-emerald-500/10 border-emerald-500/20 text-emerald-400' }}">
                  <i class="fa-solid {{ 'fa-circle-exclamation' if category == 'error' else 'fa-circle-check' }} text-[10px] shrink-0"></i>
                  <span class="truncate">{{ message }}</span>
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

      </div>
    </div>

  </body>
</html>
